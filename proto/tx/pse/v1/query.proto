syntax = "proto3";
package tx.pse.v1;

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "tx/pse/v1/distribution.proto";
import "tx/pse/v1/params.proto";

option go_package = "github.com/tokenize-x/tx-chain/v8/x/pse/types";

// Query defines the gRPC querier service.
service Query {
  // Params queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/tx/pse/v1/params";
  }

  // Score queries the current total score of an account (delegator).
  rpc Score(QueryScoreRequest) returns (QueryScoreResponse) {
    option (google.api.http).get = "/tx/pse/v1/score/{address}";
  }

  // ScheduledDistributions queries all scheduled distributions (both processed and unprocessed).
  rpc ScheduledDistributions(QueryScheduledDistributionsRequest) returns (QueryScheduledDistributionsResponse) {
    option (google.api.http).get = "/tx/pse/v1/scheduled_distributions";
  }

  // UnprocessedScheduledDistributions queries only unprocessed (upcoming) scheduled distributions.
  rpc UnprocessedScheduledDistributions(QueryUnprocessedScheduledDistributionsRequest) returns (QueryUnprocessedScheduledDistributionsResponse) {
    option (google.api.http).get = "/tx/pse/v1/unprocessed_scheduled_distributions";
  }

  // ProcessedScheduledDistributions queries only processed (completed) scheduled distributions.
  rpc ProcessedScheduledDistributions(QueryProcessedScheduledDistributionsRequest) returns (QueryProcessedScheduledDistributionsResponse) {
    option (google.api.http).get = "/tx/pse/v1/processed_scheduled_distributions";
  }

  // ClearingAccountBalances queries the current balances of all PSE clearing accounts.
  rpc ClearingAccountBalances(QueryClearingAccountBalancesRequest) returns (QueryClearingAccountBalancesResponse) {
    option (google.api.http).get = "/tx/pse/v1/clearing_account_balances";
  }

  // LastProcessedDistributionID queries the ID of the last completed distribution.
  rpc LastProcessedDistributionID(QueryLastProcessedDistributionIDRequest) returns (QueryLastProcessedDistributionIDResponse) {
    option (google.api.http).get = "/tx/pse/v1/last_processed_distribution_id";
  }
}

// QueryParamsRequest defines the request type for querying moduleparameters.
message QueryParamsRequest {}

// QueryParamsResponse defines the response type for querying module parameters.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"params\""
  ];
}

// QueryScoreRequest defines the request type for querying an account's current score.
message QueryScoreRequest {
  // address is the delegator address to query the score for.
  string address = 1;
}

// QueryScoreResponse defines the response type for querying an account's current score.
message QueryScoreResponse {
  // score is the current total score for the delegator.
  // This includes both the accumulated score snapshot and uncalculated scores
  // from active delegations since the last distribution.
  string score = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// QueryScheduledDistributionsRequest defines the request type for querying future scheduled distributions.
message QueryScheduledDistributionsRequest {}

// QueryScheduledDistributionsResponse defines the response type for querying future scheduled distributions.
message QueryScheduledDistributionsResponse {
  // scheduled_distributions contains all future scheduled distributions sorted by timestamp in ascending order.
  // Past scheduled distributions list are automatically removed after processing,
  // so all returned scheduled distributions are future scheduled distributions.
  repeated ScheduledDistribution scheduled_distributions = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"schedule_distributions\""
  ];

  bool disable_distributions = 2 [(gogoproto.moretags) = "yaml:\"disable_distributions\""];
}

// QueryClearingAccountBalancesRequest defines the request type for querying clearing account balances.
message QueryClearingAccountBalancesRequest {}

// ClearingAccountBalance represents the balance of a single clearing account.
message ClearingAccountBalance {
  // clearing_account is the name of the clearing account.
  string clearing_account = 1 [(gogoproto.moretags) = "yaml:\"clearing_account\""];

  // balance is the current balance of the clearing account in the bond denom.
  string balance = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"balance\""
  ];
}

// QueryClearingAccountBalancesResponse defines the response type for querying clearing account balances.
message QueryClearingAccountBalancesResponse {
  // balances contains the current balances of all PSE clearing accounts in the bond denom.
  repeated ClearingAccountBalance balances = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"balances\""
  ];
}

// QueryLastProcessedDistributionIDRequest defines the request type for querying the last processed distribution ID.
message QueryLastProcessedDistributionIDRequest {}

// QueryLastProcessedDistributionIDResponse defines the response type for querying the last processed distribution ID.
message QueryLastProcessedDistributionIDResponse {
  // last_processed_distribution_id is the ID of the last completed distribution.
  // Returns 0 if no distribution has been processed yet.
  uint64 last_processed_distribution_id = 1;
}

// QueryUnprocessedScheduledDistributionsRequest defines the request type for querying unprocessed scheduled distributions.
message QueryUnprocessedScheduledDistributionsRequest {}

// QueryUnprocessedScheduledDistributionsResponse defines the response type for querying unprocessed scheduled distributions.
message QueryUnprocessedScheduledDistributionsResponse {
  // scheduled_distributions contains unprocessed (upcoming) scheduled distributions
  // with ID > LastProcessedDistributionID, sorted by id in ascending order.
  repeated ScheduledDistribution scheduled_distributions = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"scheduled_distributions\""
  ];
  // last_processed_distribution_id is the ID of the last completed distribution for context.
  uint64 last_processed_distribution_id = 2;
  // disable_distributions indicates whether distributions are currently disabled.
  bool disable_distributions = 3;
}

// QueryProcessedScheduledDistributionsRequest defines the request type for querying processed scheduled distributions.
message QueryProcessedScheduledDistributionsRequest {}

// QueryProcessedScheduledDistributionsResponse defines the response type for querying processed scheduled distributions.
message QueryProcessedScheduledDistributionsResponse {
  // scheduled_distributions contains processed (completed) scheduled distributions
  // with ID <= LastProcessedDistributionID, sorted by id in ascending order.
  repeated ScheduledDistribution scheduled_distributions = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"scheduled_distributions\""
  ];
  // last_processed_distribution_id is the ID of the last completed distribution.
  uint64 last_processed_distribution_id = 2;
}
